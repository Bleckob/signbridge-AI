name: Backend CI

on:
  push:
    branches: [main, backend]
    paths:
      - "services/**"
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "services/**"
      - "backend/**"

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check services/ backend/ --select E,F,W --ignore E501

      - name: Check imports resolve
        run: |
          python -c "import fastapi; import redis; import httpx; print('All imports OK')"
